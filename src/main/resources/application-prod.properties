# 운영(AWS Lightsail 2GB / 1 vCPU) 프로파일. 실행: --spring.profiles.active=prod
spring.application.name=poker
server.port=8080

# 저사양 배려: 라이브 이퀴티 몬테카를로 반복을 줄여 1 vCPU 부하를 낮춘다(기본 1500 → 600).
poker.equity.live-iterations=600

# 통계 스냅샷 영속 위치(서비스 계정이 쓸 수 있는 경로로).
poker.stats.file=/var/lib/homepoker/stats.json

# 종료 시 진행 중 요청을 정리(무중단 배포 시 커넥션 드랍 완화).
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# 운영 로그는 간결하게.
logging.level.root=INFO
logging.level.org.springframework.web.socket=WARN
